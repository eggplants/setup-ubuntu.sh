name: Validate autoinstall.yaml

on:
  push:
    paths:
      - docs/autoinstall.yaml
      - .github/workflows/validate-autoinstall.yml
  pull_request:
    paths:
      - docs/autoinstall.yaml
      - .github/workflows/validate-autoinstall.yml
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve image digest
        id: digest
        run: |
          digest=$(docker buildx imagetools inspect \
            ghcr.io/eggplants/validate-ubuntu-autoinstall-docker \
            --format '{{.Manifest.Digest}}')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Cache docker image
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/validate-ubuntu-autoinstall.tar
          key: docker-validate-ubuntu-autoinstall-${{ steps.digest.outputs.digest }}

      - name: Pull and save image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/eggplants/validate-ubuntu-autoinstall-docker
          docker save ghcr.io/eggplants/validate-ubuntu-autoinstall-docker \
            -o /tmp/validate-ubuntu-autoinstall.tar

      - name: Load cached image
        if: steps.cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/validate-ubuntu-autoinstall.tar

      - name: Validate autoinstall.yaml
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/docs/autoinstall.yaml:/autoinstall.yaml" \
            ghcr.io/eggplants/validate-ubuntu-autoinstall-docker /autoinstall.yaml
